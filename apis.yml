- name: Ivanti Connect Secure REST API
  description: >-
    REST API for managing Ivanti Connect Secure (formerly Pulse Connect Secure)
    VPN appliances. Provides endpoints for system configuration, user and role
    management, authentication server configuration, license management, network
    settings, resource policies, and system maintenance operations. Supports
    JSON format and uses API key-based authentication.
  humanURL: https://help.ivanti.com/ps/help/en_US/IPS/vNow/pcs-pps-rest-api/landingpage.htm
  baseURL: https://{appliance-host}/api/v1
  tags:
  - vpn
  - secure-access
  - configuration
  - authentication
  - network-security
  - ssl-vpn
  properties:
  - type: X-documentation
    url: https://help.ivanti.com/ps/help/en_US/IPS/vNow/pcs-pps-rest-api/landingpage.htm
  - type: X-documentation
    url: https://help.ivanti.com/ps/help/en_US/IPS/vNow/pcs-pps-rest-api/ics-spec-configs-using-restapis.htm
  - type: X-documentation
    url: https://help.ivanti.com/ps/legacy/PCS/9.1Rx/9.1R7/9.1R7-PCS_PPS-REST-API-Solutions-Guide.pdf
  - type: X-getting-started
    url: https://forums.ivanti.com/s/article/How-To-Get-Rest-API-Key-From-Ivanti-Connect-Secure-Using-Postman-Application?language=en_US
- name: Ivanti Policy Secure REST API
  description: >-
    REST API for managing Ivanti Policy Secure (formerly Pulse Policy Secure)
    network access control appliances. Provides a standardized method for
    next-gen firewalls, NAC devices, and third-party systems to interact with
    IPS. Supports GET, POST, PUT, and DELETE operations with JSON format.
  humanURL: https://help.ivanti.com/ps/help/en_US/IPS/vNow/pcs-pps-rest-api/landingpage.htm
  baseURL: https://{appliance-host}/api/v1
  tags:
  - nac
  - network-access-control
  - policy
  - security
  - configuration
  properties:
  - type: X-documentation
    url: https://help.ivanti.com/ps/help/en_US/IPS/vNow/pcs-pps-rest-api/landingpage.htm
  - type: X-documentation
    url: https://help.ivanti.com/ps/legacy/PCS/9.1Rx/9.1R7/9.1R7-PCS_PPS-REST-API-Solutions-Guide.pdf
- name: Ivanti Neurons for Zero Trust Access REST API
  description: >-
    REST API for managing Ivanti Neurons for Zero Trust Access (nZTA). The API
    service runs on the Controller and provides endpoints for managing zero
    trust access policies, gateways, and user access. Enables programmatic
    management of software-defined perimeter and microsegmentation capabilities.
  humanURL: https://help.ivanti.com/ps/help/en_US/nSA/22.x/nsa-zta/api/landingpage.htm
  baseURL: https://{controller-host}/api
  tags:
  - zero-trust
  - ztna
  - secure-access
  - software-defined-perimeter
  - microsegmentation
  properties:
  - type: X-documentation
    url: https://help.ivanti.com/ps/help/en_US/nSA/22.x/nsa-zta/api/landingpage.htm
  - type: X-documentation
    url: https://help.ivanti.com/ps/help/en_US/nSA/22.x/pzta-docs-latest/pzta-api/html/index.html
  - type: X-documentation
    url: https://help.ivanti.com/ps/help/en_US/nSA/22.x/pzta-docs-latest/pzta-api/html/api_overview.html
