    url: https://api.pulse.example.com/v1/openapi.json
  - type: X-postman-collection
    url: https://pulse.example.com/postman/core-api.json
  - type: X-signup
    url: https://pulse.example.com/signup
  - type: X-pricing
    url: https://pulse.example.com/pricing
  - type: X-terms-of-service
    url: https://pulse.example.com/terms
  - type: X-authentication
    url: https://pulse.example.com/docs/authentication
  contact:
  - FN: Pulse API Support
    email: api-support@pulse.example.com
    X-twitter: pulseapi
- name: Pulse Analytics API
  description: API for accessing analytics, metrics, and reporting data
  image: https://example.com/pulse-analytics-icon.png
