name: Pulse API
description: >-
  APIs for Ivanti Pulse Secure (formerly Pulse Secure), providing secure remote
  access VPN, network access control, and zero trust access solutions. Ivanti
  Connect Secure (formerly Pulse Connect Secure) is the most widely deployed
  SSL VPN for organizations of any size, offering REST APIs for configuration
  management, system monitoring, authentication, and license management.
image: https://example.com/pulse-logo.png
url: https://www.ivanti.com/products/connect-secure-vpn
created: '2024-01-15'
modified: '2026-03-03'
